name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  playwright:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (E2E + API + a11y)
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  runn:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install runn
        run: go install github.com/k1LoW/runn@latest

      - name: Start API and run runn
        run: |
          node api/server.js &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4174/api/health && break
            sleep 1
          done
          curl -sf http://127.0.0.1:4174/api/health
          $(go env GOPATH)/bin/runn run runn/*.yml
